openapi: 3.0.3
info:
  title: n8n Nextcloud Integration API
  description: |
    API for managing Nextcloud Tasks and Calendar events via n8n workflows.
    All endpoints accept POST requests with JSON bodies.
    
    ## Authentication
    Use HTTP Basic Auth with your Nextcloud credentials (username + app password).
    
    ## Discovery
    - POST /webhook/nextcloud-tasks - Task operations
    - POST /webhook/nextcloud-calendar - Calendar operations
    
    ## Common Response Format
    All responses return JSON with `success: boolean` field.
  version: 1.0.0
  contact:
    name: Ahmed Rezk
    email: rezk5024@gmail.com

servers:
  - url: http://localhost:5678
    description: Local n8n instance

paths:
  /webhook/nextcloud-tasks:
    post:
      operationId: tasksAction
      summary: Nextcloud Tasks Operations
      description: |
        Perform CRUD operations on Nextcloud Tasks.
        Send an `action` field to specify the operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FetchTasks'
                - $ref: '#/components/schemas/CreateTask'
                - $ref: '#/components/schemas/UpdateTask'
                - $ref: '#/components/schemas/DeleteTask'
            examples:
              fetch:
                summary: List all tasks
                value:
                  action: fetch
              create:
                summary: Create a new task
                value:
                  action: create
                  title: Buy groceries
                  priority: 3
                  due: "2025-01-20T18:00:00"
              update:
                summary: Mark task as completed
                value:
                  action: update
                  taskUid: "1234567890"
                  status: completed
              delete:
                summary: Delete a task
                value:
                  action: delete
                  taskUid: "1234567890"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /webhook/nextcloud-calendar:
    post:
      operationId: calendarAction
      summary: Nextcloud Calendar Operations
      description: |
        Perform CRUD operations on Nextcloud Calendar events.
        Send an `action` field to specify the operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FetchEvents'
                - $ref: '#/components/schemas/CreateEvent'
                - $ref: '#/components/schemas/DeleteEvent'
            examples:
              fetch:
                summary: List all calendar events
                value:
                  action: fetch
              create:
                summary: Create a new event
                value:
                  action: create
                  title: Team Meeting
                  start: "2025-01-20T09:00:00"
                  end: "2025-01-20T10:00:00"
              delete:
                summary: Delete an event
                value:
                  action: delete
                  eventUid: "1234567890"
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'

components:
  schemas:
    # Task Schemas
    FetchTasks:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [fetch]

    CreateTask:
      type: object
      required: [action, title]
      properties:
        action:
          type: string
          enum: [create]
        title:
          type: string
          description: Task title
          example: "Buy groceries"
        description:
          type: string
          description: Task description
        due:
          type: string
          format: date-time
          description: Due date (ISO 8601)
          example: "2025-01-20T18:00:00"
        startDate:
          type: string
          format: date-time
          description: Start date
        status:
          type: string
          enum: [todo, in-progress, completed, cancelled]
          description: Task status
        priority:
          type: integer
          minimum: 1
          maximum: 9
          description: Priority (1=highest, 9=lowest)
        percentComplete:
          type: integer
          minimum: 0
          maximum: 100
          description: Completion percentage
        categories:
          type: array
          items:
            type: string
          description: Categories/tags
          example: ["shopping", "personal"]
        parentTaskUid:
          type: string
          description: Parent task UID for subtasks
        duration:
          type: string
          description: ISO 8601 duration (e.g., PT1H, P1D)
        recurrence:
          type: string
          description: RRULE for recurring tasks
          example: "FREQ=WEEKLY;BYDAY=MO"
        location:
          type: string

    UpdateTask:
      type: object
      required: [action, taskUid]
      properties:
        action:
          type: string
          enum: [update]
        taskUid:
          type: string
          description: Task UID/filename from fetch
        title:
          type: string
        description:
          type: string
        due:
          type: string
          format: date-time
        status:
          type: string
          enum: [todo, in-progress, completed, cancelled]
        priority:
          type: integer
          minimum: 1
          maximum: 9
        percentComplete:
          type: integer
          minimum: 0
          maximum: 100
        categories:
          type: array
          items:
            type: string

    DeleteTask:
      type: object
      required: [action, taskUid]
      properties:
        action:
          type: string
          enum: [delete]
        taskUid:
          type: string
          description: Task UID/filename from fetch

    # Calendar Schemas
    FetchEvents:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [fetch]

    CreateEvent:
      type: object
      required: [action, title]
      properties:
        action:
          type: string
          enum: [create]
        title:
          type: string
          description: Event title
          example: "Team Meeting"
        start:
          type: string
          format: date-time
          description: Start date/time
          example: "2025-01-20T09:00:00"
        end:
          type: string
          format: date-time
          description: End date/time
        allDay:
          type: boolean
          description: All-day event
        location:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [tentative, confirmed, cancelled]
        categories:
          type: array
          items:
            type: string
        recurrence:
          type: string
          description: RRULE for recurring events
          example: "FREQ=WEEKLY;BYDAY=MO,WE,FR"

    DeleteEvent:
      type: object
      required: [action, eventUid]
      properties:
        action:
          type: string
          enum: [delete]
        eventUid:
          type: string
          description: Event UID/filename from fetch

    # Response Schemas
    TaskResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        files:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              href:
                type: string
        count:
          type: integer

    CalendarResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        files:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              href:
                type: string
        count:
          type: integer
